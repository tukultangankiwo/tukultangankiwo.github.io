<!DOCTYPE html>
<html>
<head>
  <title>Paito Taiwan</title>
  <style>
    /* Tambahkan gaya CSS sesuai kebutuhan */
    body { font-family: sans-serif; }
    #table { width: 80%; margin: 20px auto; }
  </style>
</head>
<body>

  <h2>Paito Taiwan</h2>
  <p>
    Paito Taiwan adalah data keluaran togel Taiwan yang disusun dalam bentuk tabel. Data ini sering digunakan oleh para pemain togel untuk menganalisis pola dan memprediksi angka keluaran selanjutnya. 
  </p>

  <div id="table"></div>

  <script>
    // URL TARGET
    const url = 'http://128.199.67.184/';

    fetch(url)
      .then(response => response.text())
      .then(html => {
        const startMarker = "angka yang keluar.";
        const endMarker = "Link lainnya :";

        const startIndex = html.indexOf(startMarker) + startMarker.length;
        const endIndex = html.indexOf(endMarker, startIndex);

        if (startIndex !== -1 && endIndex !== -1) {
          const tableHtml = html.substring(startIndex, endIndex);

          // Menambahkan </table> jika belum ada
          if (!tableHtml.includes('</table>')) {
            tableHtml += '</table>';
          }

          document.getElementById('table').innerHTML = tableHtml;
        } else {
          document.getElementById('table').innerHTML = "Tabel tidak ditemukan.";
        }
      })
      .catch(error => {
        console.error('Terjadi kesalahan:', error);
        document.getElementById('table').innerHTML = "Terjadi kesalahan saat mengambil tabel.";
      });
  </script>

</body>
</html>
