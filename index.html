<!DOCTYPE html>
<html>
<head>
  <title>Paito Taiwan</title>
  <style>
    /* Tambahkan gaya CSS sesuai kebutuhan */
    body { font-family: sans-serif; }
    #table { width: 80%; margin: 20px auto; }
  </style>
</head>
<body>

  <h2>Paito Taiwan</h2>
  <p>
    Paito Taiwan adalah data keluaran togel Taiwan yang disusun dalam bentuk tabel. Data ini sering digunakan oleh para pemain togel untuk menganalisis pola dan memprediksi angka keluaran selanjutnya. 
  </p>

  <div id="table">Loading...</div> 

  <script>
    // URL TARGET (menggunakan proxy CORS)
    const url = 'https://cors-anywhere.herokuapp.com/http://128.199.67.184/'; 
    // const url = 'http://128.199.67.184/'; // Jika tidak ada masalah CORS

    fetch(url)
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok.');
        }
        return response.text();
      })
      .then(html => {
        // Menggunakan DOMParser untuk parsing HTML dengan lebih aman
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Mencari tabel berdasarkan ID atau class (lebih spesifik)
        const table = doc.querySelector('#tabel_taiwan'); // Ganti '#tabel_taiwan' dengan ID atau class tabel yang sesuai
        
        if (table) {
          document.getElementById('table').innerHTML = table.outerHTML;
        } else {
          document.getElementById('table').innerHTML = "Tabel tidak ditemukan.";
        }
      })
      .catch(error => {
        console.error('Terjadi kesalahan:', error);
        document.getElementById('table').innerHTML = "Terjadi kesalahan saat mengambil tabel.";
      });
  </script>

</body>
</html>
