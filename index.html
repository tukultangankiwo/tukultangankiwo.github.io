<!DOCTYPE html>
<html>
<head>
    <title>Tabel Data</title>
    <style>
        body {
            background-color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0; 
        }

        table {
            width: 95%; 
            max-width: 100%; 
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            background-color: #333;
            color: white;
            margin-bottom: 20px;
            table-layout: fixed; 
            overflow-x: auto; 
        }

        th, td {
            padding: 8px; 
            text-align: center;
            border: 1px solid #555;
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        th {
            background-color: #555;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #444; 
        }

        .active-column {
            background-color: #777; 
        }

        .color-picker-container {
            display: flex;
            align-items: center; 
            justify-content: center; 
            gap: 5px; 
            margin-bottom: 10px; 
        }

        .color-picker {
            display: flex;
            flex-wrap: wrap;
            gap: 5px; 
        }

        .color-option, .clear-button { 
            width: 30px; 
            height: 30px;
            border: 1px solid #555;
            cursor: pointer;
            margin-bottom: 5px;
            display: flex; 
            align-items: center;
            justify-content: center;
        }

        .clear-button {
            background-color: #555;
            color: white;
        }

        /* Media query untuk layar yang sangat kecil */
        @media (max-width: 480px) {
            table {
                font-size: 10px; 
            }

            th, td {
                padding: 4px; 
            }
        }
    </style>
</head>
<body>
    <div class="color-picker-container">
        <div class="color-picker"></div>
        <button class="clear-button">Clear</button>
    </div>
    <div id="table-container"></div>

    <script>
        const colorOptions = ['#f00', '#ffc0cb', '#0f0', '#800080', '#add8e6', '#00f', '#808080', '#ffa500', '#fff'];
        const tableContainer = document.getElementById('table-container');
        const colorPicker = document.querySelector('.color-picker');
        const clearButton = document.querySelector('.clear-button');
        let selectedColor = '#777'; 

        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('http://128.199.67.184/'))
            .then(response => {
                if (response.ok) return response.json()
                throw new Error('Network response was not ok.')
            })
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                const table = doc.querySelector('.lassres table'); 

                if (table) {
                    tableContainer.appendChild(table); 

                    table.addEventListener('click', (event) => {
                        const target = event.target;
                        if (target.tagName === 'TD') {
                            table.querySelectorAll('td').forEach(td => td.classList.remove('active-column'));
                            target.classList.add('active-column');
                            target.style.backgroundColor = selectedColor; 
                        }
                    });
                } else {
                    tableContainer.textContent = "Tabel tidak ditemukan.";
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                tableContainer.textContent = "Terjadi kesalahan saat mengambil data.";
            });

        colorOptions.forEach(color => {
            const colorOption = document.createElement('div');
            colorOption.classList.add('color-option');
            colorOption.dataset.color = color;
            colorOption.style.backgroundColor = color;
            colorOption.addEventListener('click', () => {
                selectedColor = color;
            });
            colorPicker.appendChild(colorOption);
        });

        clearButton.addEventListener('click', () => {
            const table = document.querySelector('table');
            const cells = table.querySelectorAll('td');
            cells.forEach(cell => {
                cell.classList.remove('active-column');
                cell.style.backgroundColor = ''; 
            });
        });
    </script>
</body>
</html>
