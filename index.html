<!DOCTYPE html>
<html>
<head>
    <title>Tabel Data</title>
    <style>
        /* Style untuk tabel */
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            background-color: #333;
            color: white;
            margin-bottom: 20px; 
        }

        th {
            background-color: #555;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        td {
            padding: 8px;
            text-align: center;
            border: 1px solid #555;
        }

        tr:nth-child(even) {
            background-color: #444; 
        }

        /* Style untuk kolom yang aktif (diklik) */
        .active-column {
            background-color: #777; /* Warna latar belakang kolom aktif */
        }

        /* Style untuk pilihan warna */
        .color-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .color-option {
            width: 20px;
            height: 20px;
            border: 1px solid #555;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="color-picker"></div>
    <div id="table-container"></div>

    <script>
        const colorOptions = ['#f00', '#ffc0cb', '#0f0', '#800080', '#add8e6', '#00f', '#808080', '#ffa500', '#fff'];
        const tableContainer = document.getElementById('table-container');
        const colorPicker = document.querySelector('.color-picker');
        let selectedColor = '#777'; 

        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('http://128.199.67.184/'))
            .then(response => {
                if (response.ok) return response.json()
                throw new Error('Network response was not ok.')
            })
            .then(data => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                const table = doc.querySelector('.lassres table'); 

                if (table) {
                    tableContainer.appendChild(table); 

                    // Logika untuk mengganti warna kolom saat diklik
                    table.addEventListener('click', (event) => {
                        const target = event.target;
                        if (target.tagName === 'TD') {
                            table.querySelectorAll('td').forEach(td => td.classList.remove('active-column'));
                            target.classList.add('active-column');
                            target.style.backgroundColor = selectedColor; 
                        }
                    });
                } else {
                    tableContainer.textContent = "Tabel tidak ditemukan.";
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                tableContainer.textContent = "Terjadi kesalahan saat mengambil data.";
            });

        // Buat pilihan warna
        colorOptions.forEach(color => {
            const colorOption = document.createElement('div');
            colorOption.classList.add('color-option');
            colorOption.dataset.color = color;
            colorOption.style.backgroundColor = color;
            colorOption.addEventListener('click', () => {
                selectedColor = color;
            });
            colorPicker.appendChild(colorOption);
        });
    </script>
</body>
</html>
