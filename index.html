<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paito Taiwan - Hasil Keluaran Taiwan Terlengkap dan Terbaru</title>
    <meta name="description" content="Situs ini menyediakan hasil keluaran Paito Taiwan terlengkap dan terbaru. Dapatkan informasi hasil undian Taiwan secara cepat dan akurat.">
    <meta name="keywords" content="paito taiwan, keluaran taiwan, hasil taiwan, data taiwan, togel taiwan">
    <style>
        body {
            font-family: monospace;
            background-color: #121212;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #f00;
        }
        .table-container {
            overflow-x: auto;
        }
        iframe {
            width: 100%;
            height: 600px; /* Sesuaikan tinggi iframe sesuai kebutuhan */
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Paito Taiwan</h1>
        <div class="table-container">
            <iframe id="paitoIframe" src=""></iframe> 
        </div>

        <script>
            const iframe = document.getElementById('paitoIframe');

            fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('http://sssaaass.free.nf/index.php')) 
                .then(response => {
                    if (response.ok) return response.json()
                    throw new Error('Network response was not ok.')
                })
                .then(data => {
                    iframe.srcdoc = data.contents; // Menampilkan konten HTML dari respons proxy di dalam iframe
                })
                .catch(error => console.error('Error:', error));
        </script>
    </div>
</body>
</html>
